{% include "store/base.html" %}

{% load static %}

{% load crispy_forms_tags %}




{% block content %}
    <style>

        body{
            background-color: gray;
        }
 
    </style>


    <body>
        <br>
        <div class="container bg-white shadow-md p-5 form-layout">
            <h3> Login to your account </h3>
            <hr>
            <br>
            <br>

            <form method='POST' autocomplete='off'>

                {% csrf_token %}
                
                {{ form.username|as_crispy_field }}
                <br>
                {{ form.password|as_crispy_field }}
                <br>

                <br>
                <button type='submit' class='btn btn-primary navbar-btn text-white w-100 btn-block p-2'>&nbsp; <i class="fa fa-key" aria-hidden="true"></i>  login</button>
           
                <br><br>
                <div class='text-center'>
                    <a href='{% url 'register' %}'> Don't have an account? </a>
                </div>

                <br>
                <div class='text-center'>
                    <a href='{% url 'reset_password' %}'> Forgotten your password? </a>
                </div>

            </form>

        </div>


    </body>
{% endblock content %}
